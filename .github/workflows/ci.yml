name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tooling
        run: pip install ruff
      - name: Lint Python
        run: ruff check services

  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service:
          - ai-agent
          - healer-controller
          - discord-bot
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:latest

  update-gitops-tag:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: mikefarah/yq@v4.44.6
        with:
          cmd: |
            yq -i '.global.imageRegistry = strenv(IMAGE_REGISTRY)' charts/aio-self-healing/values.yaml
            yq -i '.global.imageTag = strenv(IMAGE_TAG)' charts/aio-self-healing/values.yaml
      - name: Commit updated image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/aio-self-healing/values.yaml
          git commit -m "chore: update image tag to ${IMAGE_TAG} [skip ci]" || exit 0
          git push
