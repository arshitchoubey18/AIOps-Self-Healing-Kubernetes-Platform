apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aio-self-healing
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/replace-owner/aiops-self-healing.git
    targetRevision: main
    path: charts/aio-self-healing
  destination:
    server: https://kubernetes.default.svc
    namespace: aiops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

